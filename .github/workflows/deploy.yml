name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate .env
        run: |
          cd /home/docker-steven/fastrecover-admin
          bash scripts/check-env.sh env.required .env

      - name: Build and deploy
        run: |
          cd /home/docker-steven/fastrecover-admin
          # Descartar cambios locales y archivos no trackeados (preservar .env)
          git reset --hard HEAD
          git clean -fd -e ".env" -e "*.env"
          git pull origin main
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Wait for container healthy
        run: |
          cd /home/docker-steven/fastrecover-admin
          bash scripts/wait-healthy.sh fastrecover-admin 30 2 3000
        timeout-minutes: 2

      - name: Health check
        run: |
          sleep 5
          docker exec fastrecover-admin wget -qO- http://localhost:3000/ >/dev/null || exit 1
        timeout-minutes: 1
